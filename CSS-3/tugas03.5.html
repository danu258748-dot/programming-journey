<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Text Shadow</title>
  <style>
    .body{
        height: 100vh;
        box-shadow: inset;
        margin: 0;
        display: flex;
        font-family: Arial, sans-serif;
    }
    .a {
      color: black;
      text-shadow: 
      0 0 5px #efff10,
      0 0 10px #efff10,
      0 0 20px #efff10;
      font-size: 35px;
      background: blue;
      border: 200px;
      border-radius: 100px;
      box-shadow: 1.8;

    }
    .container{
        text-align: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="a">Text Shadow Keren</div>
  </div>
</body>
</html>
