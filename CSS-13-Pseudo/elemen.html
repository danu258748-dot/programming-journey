<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pseudo Urutan Elemen</title>
    <style>
        /* Anak pertama */
        li:first-child a {
            color: green;
        }

        /* Anak terakhir */
        li:last-child a {
            color: blue;
        }

        /* Anak ke-3 */
        li:nth-child(3) a {
            color: red;
        }

        /* Anak genap */
        li:nth-child(2n) a {
            color: purple;
        }

        /* Anak ganjil */
        li:nth-child(2n-1) a {
            color: orange;
        }
    </style>

</head>
<body>

    <a href="#" class="hello">Hello World</a>

    <ul>
        <li><a href="#">Link 1</a></li>
        <li><a href="#">Link 2</a></li>
        <li><a href="#">Link 3</a></li>
        <li><a href="#">Link 4</a></li>
        <li><a href="#">Link 5</a></li>
    </ul>

</body>
</html>
